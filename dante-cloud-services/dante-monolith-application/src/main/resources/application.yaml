server:
  port: 8847
  servlet:
    session:
      timeout: 2h
  jetty:
    connection-idle-timeout: 30000 #在请求延迟高时，避免线程被快速占满
  compression:
    enabled: true    # 启用GZIP压缩
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json # 压缩类型
    min-response-size: 1024  # 最小压缩响应大小
spring:
  application:
    name:  @artifactId@
  profiles:
    active: development-postgresql
  data:
    redis:
      repositories:
        enabled: false
  session:
    timeout: ${server.servlet.session.timeout}
  threads:
    virtual:
      enabled: true
  http:
    clients:
      imperative:
        factory: jdk
  web:
    error:
      include-exception: true
      include-message: always
      include-stacktrace: always
      include-binding-errors: always
  mvc:
    apiversion:
      use:
        header: X-Herodotus-Api-Version
      default: v1
  ssl:
    bundle:
      jks:
        dante-cloud-sas:
          key:
            alias: dante-cloud-sas
            password: 123456
          keystore:
            location: classpath:certificate/dante-cloud-sas_keystore.p12
            password: 123456
            type: PKCS12
          truststore:
            location: classpath:certificate/dante-cloud-sas_truststore.p12
            password: password
            type: PKCS12
herodotus:
  oauth2:
    authentication:
      ssl-bundle-provider: dante-cloud-sas

sms:
  is-print: false

jasypt:
  encryptor:
    password: ${JASPYT_HOME:2bda7d3a-dba1-45a4-b08e-cbd731a0418e}
---
# 开发环境配置
spring:
  config:
    activate:
      on-profile: development-postgresql
  sql:
    init:
      mode: never
      platform: postgresql
      continue-on-error: true
      encoding: UTF-8
      username: ${spring.datasource.username}
      password: ${spring.datasource.password}
      # 第一种方式启动的时候 Jpa 会自动创建表，import.sql 只负责创建表单后的初始化数据。第二种方式启动的时候不会创建表，需要在初始化脚本中判断表是否存在，再初始化脚本的步骤
      # refer: https://www.cnblogs.com/ityouknow/p/7089170.html
      data-locations:
        - classpath:sqls/oss-data-postgresql.sql
  #        - classpath:sqls/oss-data-mysql.sql

  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:p6spy:postgresql://localhost:15432/dante_athena
    username: athena
    password: athena
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: Hikari
      minimum-idle: 5
      maximum-pool-size: 30
      # Lowest acceptable connection timeout is 250 ms. Default: 30000 (30 seconds)
      # 30 秒太长，高并发时线程卡住 30s 才失败，用户体验差。缩短至 3~10s 快速失败，让上层重试或降级。
      connection-timeout: 10000
      # the interval in which connections will be tested for aliveness, thus keeping them alive by the act of checking. Value is in milliseconds, default is 0 (disabled)
      # 防止连接被数据库/防火墙空闲断开。应 小于 数据库 idle_in_transaction_session_timeout 或防火墙超时。
      keepalive-time: 60000
      # The minimum allowed value is 10000ms (10 seconds). Default: 600000 (10 minutes)
      idle-timeout: 120000
      # We strongly recommend setting this value, and it should be at least 30 seconds less than any database or infrastructure imposed connection time limit. Default: 1800000 (30 minutes)
      max-lifetime: 1800000
      # Lowest acceptable validation timeout is 250 ms. Default: 5000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      data-source-properties:
        # 将批量 insert 改写为多行 insert，显著提升批量插入性能
        reWriteBatchedInserts: true
        # 预编译阈值：执行超过 N 次才使用服务端预编译，避免单次 SQL 也花代价预编译
        prepareThreshold: 5
        # 根据业务需要可调整默认 fetchSize（默认 0 即一次拉取全部，大结果集可改为 200~500）
        # defaultRowFetchSize: 200
  jpa:
    database: postgresql
    database-platform: ${spring.jpa.database}
    generate-ddl: true
    open-in-view: false
    hibernate:
      # DDL mode. This is actually a shortcut for the "hibernate.hbm2ddl.auto" property. Default to "create-drop" when using an embedded database, "none" otherwise.spring.jpa.hibernate.ddl-auto=update
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      jakarta:
        persistence:
          sharedCache:
            mode: ENABLE_SELECTIVE
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
        generate_statistics: false
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 16
        cache:
          use_query_cache: true
          use_second_level_cache: true
          use_minimal_puts: true
          region:
            factory_class: org.dromara.dante.hibernate.cache.spi.HerodotusRegionFactory
        jakarta:
          cache:
            missing_cache_strategy: create
        boot:
          allow_jdbc_metadata_access: true
        connection:
          handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
        jdbc:
          batch_size: 50
          # 让版本化数据（@Version）也能批量更新
          batch_versioned_data: true
          # 明确时区，避免数据库时区不确定造成转换开销
          time_zone: UTC
          lob:
            # 避免一些 JDBC 驱动需要环境上下文创建 LOB
            non_contextual_creation: true
        query:
          in_clause_parameter_padding: true
          fail_on_pagination_over_collection_fetch: true
          optimizer:
            enabled: true
  data:
    redis:
      database: 4
      host: 192.168.101.10
      password:
      port: 16379
      timeout: 3000ms
      lettuce:
        pool:
          enabled: true
          # 最大活跃连接数 (根据负载动态调整)。计算公式：max-active = (平均QPS × 平均耗时(秒)) / 可用实例数 + 缓冲值
          max-active: 64
          # 最大空闲连接数 (建议max-active的50-75%)。足够覆盖流量波谷，避免频繁创建连接
          max-idle: 32
          # 最小空闲连接数 (保持预热连接)。保持预热连接，应对突发流量
          min-idle: 8
          # 短等待避免线程阻塞，超时快速失败
          max-wait: 5000ms
          # 空闲连接检查间隔
          time-between-eviction-runs: 30s
        shutdown-timeout: 200ms
    redisson:
      enabled: false
      single-server-config:
        address: redis://${spring.data.redis.host}:${spring.data.redis.port}
  #        password: ${spring.data.redis.password}

  thymeleaf:
    mode: HTML
    cache: false
  security:
    oauth2:
      resourceserver:
        opaquetoken:
          client-id: 14a9cf797931430896ad13a6b1855611
          client-secret: a05fe1fc50ed42a4990c6c6fc4bec398

springdoc:
  default-flat-param-object: true
  api-docs:
    enabled: ${herodotus.platform.swagger.enabled}
    resolve-schema-properties: true
  swagger-ui:
    disable-swagger-default-url: true
    enabled: ${herodotus.platform.swagger.enabled}
    operations-sorter: method
    show-common-extensions: true
    show-extensions: true
    oauth:
      use-pkce-with-authorization-code-grant: false
      app-name: ${spring.application.name}


mybatis-plus:
  global-config:
    banner: false
    db-config:
      table-underline: true
  configuration:
    cache-enabled: true
    map-underscore-to-camel-case: true

jetcache:
  statIntervalMinutes: 15
  areaInCacheName: false
  decodeFilterAllowPatterns:
    - org.hibernate.cache.internal
  local:
    default:
      type: caffeine
      keyConvertor: jackson3
      limit: 10000
  remote:
    default:
      type: redis.lettuce
      keyConvertor: jackson3
      broadcastChannel: herodotus
      valueEncoder: java
      valueDecoder: java
      poolConfig:
        minIdle: ${spring.data.redis.lettuce.pool.min-idle}
        maxIdle: ${spring.data.redis.lettuce.pool.max-idle}
        maxTotal: ${spring.data.redis.lettuce.pool.max-active}
        maxWait: ${spring.data.redis.lettuce.pool.max-wait}
      uri:
        - redis://${spring.data.redis.password}@${spring.data.redis.host}:${spring.data.redis.port}/${spring.data.redis.database}


herodotus:
  platform:
    swagger:
      # Swagger中不知道哪里包含Kafka的注解，会自动启动，如果不连接到Kafka会导致启动失败。暂时没有解决，先取消掉。
      enabled: false
  cache:
    instances:
      data-upms-sys-employee-:
        expire: 2h
  endpoint:
    issuer-uri: http://localhost:${server.port}
  assistant:
    captcha:
      graphics:
        letter: num_and_upper_char
        font: action
    access:
      justauth:
        enabled: true
        configs:
          GITEE:
            client-id: 7c1623d76f39097579ddcae8a061
            client-secret: 8c343cad9ca732d54242f
            redirect-uri: http://aw255/social/oauth2/callback/GITEE
          OSCHINA:
            client-id: 7c1623d76f39097579123e8
            client-secret: 8c343cad9ca732d54242f002
            redirect-uri: http://192.168.101.10:8847/dante-cloud-uaa/oauth/social/gitee
    oss:
      endpoint: http://192.168.101.10:9000
      access-key: 2RO1WHelOwCFxp6Annr7
      secret-key: h8wpmcmZZZfvMoCat4Vy3Zy1JJSl0fwM8JNsvNxa
      proxy:
        source: http://localhost:3000/api
        destination: http://127.0.0.1:9000

logging:
  file:
    name: logs/${spring.application.name}.log
  level:
    root: INFO
    org.springframework: info
    org.springframework.security: debug
    org.springframework.web: info
    org.dromara: debug
    com.alicp.jetcache: info

