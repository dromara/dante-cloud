services:
  emqx:
    image: quay.io/herodotus-cloud/emqx:5.8.6
    container_name: emqx
    hostname: emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "8883:8883"
      - "18083:18083"
    volumes:
      - E:\\Workspaces\\docker-volumes\\emqx\\data:/opt/emqx/data
      - E:\\Workspaces\\docker-volumes\\emqx\\etc:/opt/emqx/etc
      - E:\\Workspaces\\docker-volumes\\emqx\\log:/opt/emqx/log

  emqx6:
    image: quay.io/herodotus-cloud/emqx-enterprise:6.2.1
    container_name: emqx6
    hostname: emqx6
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "8883:8883"
      - "18083:18083"
    volumes:
      - E:\\Workspaces\\docker-volumes\\emqx6\\data:/opt/emqx/data
      - E:\\Workspaces\\docker-volumes\\emqx6\\etc:/opt/emqx/etc
      - E:\\Workspaces\\docker-volumes\\emqx6\\log:/opt/emqx/log

