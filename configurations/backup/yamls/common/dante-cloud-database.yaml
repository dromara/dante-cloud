spring:
  sql:
    init:
      mode: ${herodotus.switch.database.init-mode}
      platform: ${herodotus.database-information.platform}
      continue-on-error: true
      encoding: UTF-8
      username: ${herodotus.environment.database.username}
      password: ${herodotus.environment.database.password}
  datasource:
    driver-class-name: ${herodotus.database-information.driver-class-name}
    url: ${herodotus.database-information.url}
    username: ${herodotus.environment.database.username}
    password: ${herodotus.environment.database.password}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: Hikari
      minimum-idle: 5
      maximum-pool-size: 30
      # Lowest acceptable connection timeout is 250 ms. Default: 30000 (30 seconds)
      # 30 秒太长，高并发时线程卡住 30s 才失败，用户体验差。缩短至 3~10s 快速失败，让上层重试或降级。
      connection-timeout: 10000
      # the interval in which connections will be tested for aliveness, thus keeping them alive by the act of checking. Value is in milliseconds, default is 0 (disabled)
      # 防止连接被数据库/防火墙空闲断开。应 小于 数据库 idle_in_transaction_session_timeout 或防火墙超时。
      keepalive-time: 60000
      # The minimum allowed value is 10000ms (10 seconds). Default: 600000 (10 minutes)
      idle-timeout: 120000
      # We strongly recommend setting this value, and it should be at least 30 seconds less than any database or infrastructure imposed connection time limit. Default: 1800000 (30 minutes)
      max-lifetime: 1800000
      # Lowest acceptable validation timeout is 250 ms. Default: 5000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      data-source-properties:
        # 将批量 insert 改写为多行 insert，显著提升批量插入性能
        reWriteBatchedInserts: true
        # 预编译阈值：执行超过 N 次才使用服务端预编译，避免单次 SQL 也花代价预编译
        prepareThreshold: 5
        # 根据业务需要可调整默认 fetchSize（默认 0 即一次拉取全部，大结果集可改为 200~500）
        # defaultRowFetchSize: 200
  jpa:
    database: ${herodotus.database-information.platform}
    database-platform: ${herodotus.database-information.platform}
    open-in-view: false
    show-sql: ${herodotus.switch.database.show-sql}
    hibernate:
      ddl-auto: ${herodotus.switch.database.ddl-auto}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      jakarta:
        persistence:
          sharedCache:
            mode: ENABLE_SELECTIVE
      hibernate:
        dialect: ${herodotus.database-information.dialect}
        format_sql: ${herodotus.switch.database.format-sql}
        show_sql: ${herodotus.switch.database.show-sql}
        generate_statistics: ${herodotus.switch.database.generate-statistics}
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 16
        cache:
          use_query_cache: true
          use_second_level_cache: ${herodotus.switch.database.use-second-level-cache}
          use_minimal_puts: true
          region:
            factory_class: org.dromara.dante.hibernate.cache.spi.HerodotusRegionFactory
        jakarta:
          cache:
            missing_cache_strategy: create
        boot:
          allow_jdbc_metadata_access: true
        connection:
          handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
        jdbc:
          batch_size: 50
          # 让版本化数据（@Version）也能批量更新
          batch_versioned_data: true
          # 明确时区，避免数据库时区不确定造成转换开销
          time_zone: UTC
          lob:
            # 避免一些 JDBC 驱动需要环境上下文创建 LOB
            non_contextual_creation: true
        query:
          in_clause_parameter_padding: true
          fail_on_pagination_over_collection_fetch: true
          optimizer:
            enabled: true

mybatis-plus:
  global-config:
    banner: false
    db-config:
      table-underline: true
  configuration:
    cache-enabled: ${herodotus.switch.database.use-second-level-cache}
    map-underscore-to-camel-case: true